# Network policy for Claude Code: Anthropic API, GitHub, npm, and PyPI.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /etc
    - /proc
    - /dev/urandom
    - /app
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  anthropic:
    name: anthropic-api
    endpoints:
      - host: "*.anthropic.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full

  github:
    name: github
    endpoints:
      - host: "*.github.com"
        port: 443
      - host: "*.githubusercontent.com"
        port: 443

  npm:
    name: npm-registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
      - host: "*.npmjs.com"
        port: 443

  pypi:
    name: pypi
    endpoints:
      - host: pypi.org
        port: 443
      - host: files.pythonhosted.org
        port: 443
