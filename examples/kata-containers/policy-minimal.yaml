# Minimal policy: allows only a single API endpoint.
# All other outbound network traffic is blocked by default.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /etc
    - /proc
    - /dev/urandom
    - /app
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  anthropic:
    name: anthropic-only
    endpoints:
      - host: api.anthropic.com
        port: 443
