# L7 read-only policy for the GitHub REST API.
# Allows GET requests to /repos/** but blocks POST, PUT, DELETE, etc.
# The proxy terminates TLS to inspect individual HTTP requests.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /etc
    - /proc
    - /dev/urandom
    - /app
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  github_readonly:
    name: github-read-only
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: full
        rules:
          - allow:
              method: GET
              path: "/repos/**"
          - allow:
              method: GET
              path: "/orgs/**"
          - allow:
              method: GET
              path: "/users/**"
    binaries:
      - path: /usr/bin/curl
